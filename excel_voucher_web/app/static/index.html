<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>엑셀 전표 처리</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>엑셀 전표 처리</h1>
      </div>
      <div class="topActions">
        <div id="userBar" class="userBar" hidden>
          <span id="userName"></span>
          <button class="textButton" id="logoutButton" type="button">로그아웃</button>
        </div>
        <button class="iconButton" id="refreshButton" type="button" title="새로고침" aria-label="새로고침">↻</button>
      </div>
    </header>

    <main id="authShell" class="authShell" hidden>
      <section class="panel authPanel" id="loginPanel">
        <div class="panelTitle">
          <h2>로그인</h2>
        </div>
        <form id="loginForm" class="authForm">
          <label>
            ID
            <input id="loginId" name="user_id" autocomplete="username" required />
          </label>
          <label>
            비밀번호
            <input id="loginPassword" name="password" type="password" autocomplete="current-password" required />
          </label>
          <button class="primaryButton" type="submit">로그인</button>
          <button class="linkButton" id="forgotPasswordButton" type="button">비밀번호 찾기</button>
        </form>
        <div class="notice" id="loginNotice"></div>
      </section>

      <section class="panel authPanel" id="changePasswordPanel" hidden>
        <div class="panelTitle">
          <h2>비밀번호 변경</h2>
        </div>
        <form id="changePasswordForm" class="authForm">
          <label>
            현재 비밀번호
            <input id="oldPassword" name="old_password" type="password" autocomplete="current-password" required />
          </label>
          <label>
            새 비밀번호
            <input id="newPassword" name="new_password" type="password" autocomplete="new-password" minlength="8" required />
          </label>
          <button class="primaryButton" type="submit">변경</button>
        </form>
        <div class="notice" id="changePasswordNotice"></div>
      </section>
    </main>

    <main id="appShell" class="shell" hidden>
      <section class="panel uploadPanel">
        <div class="panelTitle">
          <h2>엑셀 업로드</h2>
          <span class="badge">수시결제</span>
        </div>
        <form id="uploadForm" class="formGrid">
          <label class="compactField">
            담당자
            <select id="companyKey" name="company_key"></select>
          </label>
          <label class="compactField">
            작성자
            <input id="requester" name="requester" autocomplete="name" value="담당자" />
          </label>
          <label class="compactField">
            회계일
            <input id="accountingDate" name="accounting_date" type="date" />
          </label>
          <div class="fileField">
            <label for="fileInput">엑셀 파일</label>
            <input id="fileInput" name="file" type="file" accept=".xlsx,.xlsm" required hidden />
            <button class="dropZone" id="dropZone" type="button">
              <strong id="fileName">선택된 파일 없음</strong>
              <span>파일을 이곳에 끌어오거나 클릭해서 선택</span>
            </button>
          </div>
          <button class="primaryButton" id="uploadButton" type="submit">업로드 시작</button>
        </form>
        <div class="notice" id="uploadNotice"></div>
      </section>

      <section class="panel detailPanel">
        <div class="panelTitle">
          <h2>처리 현황</h2>
          <span id="detailStatus" class="badge muted">대기</span>
        </div>
        <div id="jobDetail" class="currentJob emptyState">엑셀 파일을 업로드하면 처리 현황이 표시됩니다.</div>
      </section>

      <section class="panel historyPanel">
        <div class="panelTitle">
          <h2>최근 처리 내역</h2>
          <span id="queueCount" class="badge muted">0건</span>
        </div>
        <div class="tableWrap">
          <table>
            <thead>
              <tr>
                <th>상태</th>
                <th>내용</th>
                <th>회계일</th>
                <th>진행</th>
              </tr>
            </thead>
            <tbody id="jobRows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <div class="modalBackdrop" id="erpCredentialDialog" hidden>
      <form class="modalPanel" id="erpCredentialForm">
        <div class="panelTitle">
          <h2>ERP 로그인 계정</h2>
          <span class="badge">K-System</span>
        </div>
        <p class="modalMessage" id="erpCredentialMessage"></p>
        <label>
          ERP ID
          <input id="erpUserId" name="erp_user_id" autocomplete="username" />
        </label>
        <label>
          ERP 비밀번호
          <input id="erpPassword" name="erp_password" type="password" autocomplete="current-password" />
        </label>
        <label class="checkRow">
          <input id="rememberErpCredential" type="checkbox" checked />
          이 계정을 다음 업로드에도 사용
        </label>
        <div class="modalActions">
          <button id="useSavedErpCredential" type="button">저장된 계정 사용</button>
          <button id="cancelErpCredential" type="button">취소</button>
          <button class="primaryButton" type="submit">입력한 계정으로 시작</button>
        </div>
      </form>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
